<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calmly</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0f11;
        --surface: #18181c;
        --border: #2a2a30;
        --accent: #6ee7b7;
        --accent-dim: #1e3a30;
        --text: #e8e8ec;
        --muted: #6b6b75;
        --danger: #f87171;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2.5rem;
        width: 100%;
        max-width: 520px;
        animation: fadeUp 0.4s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 2rem;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: var(--accent);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-icon svg {
        width: 20px;
        height: 20px;
        color: #0f0f11;
      }

      .logo-text {
        font-family: "DM Serif Display", serif;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
      }

      h1 {
        font-family: "DM Serif Display", serif;
        font-size: 1.75rem;
        line-height: 1.2;
        margin-bottom: 0.5rem;
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 2rem;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 1.5rem 0;
        color: var(--muted);
        font-size: 0.8rem;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.5rem;
      }

      textarea {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 0.95rem;
        padding: 0.85rem 1rem;
        resize: vertical;
        min-height: 110px;
        transition: border-color 0.2s;
        outline: none;
      }
      textarea:focus {
        border-color: var(--accent);
      }
      textarea::placeholder {
        color: var(--muted);
      }

      .file-drop {
        border: 1.5px dashed var(--border);
        border-radius: 10px;
        padding: 1.5rem;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        position: relative;
      }
      .file-drop:hover,
      .file-drop.drag-over {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .file-drop input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .file-drop-icon {
        font-size: 1.5rem;
        margin-bottom: 0.4rem;
      }
      .file-drop-label {
        font-size: 0.9rem;
        color: var(--muted);
      }
      .file-drop-label span {
        color: var(--accent);
        font-weight: 500;
      }
      .file-name {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: var(--accent);
        display: none;
      }

      .btn {
        width: 100%;
        padding: 0.85rem;
        border: none;
        border-radius: 10px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
        margin-top: 1.5rem;
        background: var(--accent);
        color: #0f0f11;
      }
      .btn:hover {
        opacity: 0.9;
      }
      .btn:active {
        transform: scale(0.98);
      }

      .error {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid var(--danger);
        color: var(--danger);
        border-radius: 8px;
        padding: 0.75rem 1rem;
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="logo-icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
        </div>
        <span class="logo-text">Calmly</span>
      </div>

      <h1>Add to Calendar</h1>
      <p class="subtitle">Paste a message or upload a screenshot — we'll handle the rest.</p>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post" enctype="multipart/form-data">
        <label>Paste event text</label>
        <textarea
          name="raw_event_text"
          placeholder="e.g. Besok rapat tim jam 10:00 sampai 11:30 di ruang meeting"
        ></textarea>

        <div class="divider">or</div>

        <label>Upload a screenshot</label>
        <div class="file-drop" id="fileDrop">
          <input type="file" name="event_image" accept="image/*" id="fileInput" />
          <div class="file-drop-icon">🖼️</div>
          <div class="file-drop-label"><span>Choose a file</span> or drag it here</div>
          <div class="file-name" id="fileName"></div>
        </div>

        <button type="submit" class="btn">Extract Event →</button>
      </form>
    </div>

    <script>
      const input = document.getElementById("fileInput");
      const nameEl = document.getElementById("fileName");
      const drop = document.getElementById("fileDrop");

      input.addEventListener("change", () => {
        if (input.files[0]) {
          nameEl.textContent = input.files[0].name;
          nameEl.style.display = "block";
        }
      });

      drop.addEventListener("dragover", (e) => {
        e.preventDefault();
        drop.classList.add("drag-over");
      });
      drop.addEventListener("dragleave", () => drop.classList.remove("drag-over"));
      drop.addEventListener("drop", (e) => {
        e.preventDefault();
        drop.classList.remove("drag-over");
        if (e.dataTransfer.files[0]) {
          input.files = e.dataTransfer.files;
          nameEl.textContent = e.dataTransfer.files[0].name;
          nameEl.style.display = "block";
        }
      });
    </script>
  </body>
</html>
